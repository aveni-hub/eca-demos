      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

  server:
    image: avenieca/server:0.6.0
    command: --config "/avenieca/server.json"
    volumes:
      - "server:/avenieca/storage"
      - "./configs/docker/server.json:/avenieca/server.json"
    depends_on:
      - postgres
      - kafka
      - qdrant
      - aggregate
    ports:
      - "2580:2580"
    networks:
      - ECACluster
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

volumes:
  qdrant_data:
    driver: local
  ac:
    driver: local
  aqi:
    driver: local
  occupancy:
    driver: local
  temperature:
    driver: local
  purifier:
    driver: local
  aggregate:
    driver: local
  core_us:
    driver: local
  core_pp:
    driver: local
  core_res:
    driver: local
  document:
    driver: local
  server:
    driver: local
  data:

networks:
  ECACluster:
