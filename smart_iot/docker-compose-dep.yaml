services:
  aggregate:
    image: avenieca/eca:0.6.0
    command: aggregate --config "/avenieca/aggregate.json"
    volumes:
      - "aggregate:/avenieca/storage"
      - "./configs/docker/aggregate.json:/avenieca/aggregate.json"
      - "./license.lic:/avenieca/license.lic"
    networks:
      - ECACluster
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

  core_us:
    image: avenieca/eca:0.6.0
    command: core-us --config "/avenieca/core_us.json"
    volumes:
      - "core_us:/avenieca/storage"
      - "./configs/docker/core_us.json:/avenieca/core_us.json"
      - "./license.lic:/avenieca/license.lic"
    depends_on:
      - aggregate
    networks:
      - ECACluster
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

  core_pp:
    image: avenieca/eca:0.6.0
    command: core-pp --config "/avenieca/core_pp.json"
    volumes:
      - "core_pp:/avenieca/storage"
      - "./configs/docker/core_pp.json:/avenieca/core_pp.json"
      - "./license.lic:/avenieca/license.lic"
    depends_on:
      - aggregate
    networks:
      - ECACluster
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

  core_res:
    image: avenieca/eca:0.6.0
    command: core-respond --config "/avenieca/core_res.json"
    volumes:
      - "core_res:/avenieca/storage"
      - "./configs/docker/core_res.json:/avenieca/core_res.json"
      - "./license.lic:/avenieca/license.lic"
    depends_on:
      - core_pp
    networks:
      - ECACluster
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

  document:
    image: avenieca/eca:0.6.0
    command: document create --config "/avenieca/document.json"
    volumes:
      - "document:/avenieca/storage"
      - "./configs/docker/document.json:/avenieca/document.json"
      - "./license.lic:/avenieca/license.lic"
    depends_on:
      - core_pp
    networks:
      - ECACluster
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

  server:
    image: avenieca/server:0.6.0
    command: --config "/avenieca/server.json"
    volumes:
      - "server:/avenieca/storage"
      - "./configs/docker/server.json:/avenieca/server.json"
      - "./license.lic:/avenieca/license.lic"
    depends_on:
      - aggregate
    ports:
      - "2580:2580"
    networks:
      - ECACluster
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 20
        window: 120s

volumes:
  aggregate:
    driver: local
  core_us:
    driver: local
  core_pp:
    driver: local
  core_res:
    driver: local
  document:
    driver: local
  server:
    driver: local

networks:
  ECACluster:
